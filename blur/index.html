<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Blur Background</title>
    <style>
      canvas {
        border: 2px solid green;
      }
    </style>
  </head>
  <body>
    <video id="inputVideo" autoplay playsinline muted></video>
    <canvas id="outputCanvas" width="640" height="480"></canvas>
    <video id="outVideo" autoplay playsinline muted></video>

    <button id="pause">Pause</button>
    <button id="resume">Resume</button>

    <!-- load mediapipe -->
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/selfie_segmentation/selfie_segmentation.js"></script>

    <script>
      const video = document.getElementById("inputVideo");
      const outVideo = document.getElementById("outVideo");
      const canvas = document.getElementById("outputCanvas");
      const ctx = canvas.getContext("2d");
      const bgImage = new Image();
      bgImage.src =
        "https://cuaxepnhuagiare.com/wp-content/uploads/2020/09/cach-bai-tri-nha-ve-sinh-duoi-gam-cau-thang.jpg.webp";
      // ✅ chỉ cần gọi trực tiếp
      const segmenter = new SelfieSegmentation({
        locateFile: (file) =>
          `https://cdn.jsdelivr.net/npm/@mediapipe/selfie_segmentation/${file}`,
      });
      segmenter.setOptions({ modelSelection: 1 });

      segmenter.onResults((results) => {
        ctx.clearRect(0, 0, canvas.width, canvas.height);

        // mask
        ctx.drawImage(
          results.segmentationMask,
          0,
          0,
          canvas.width,
          canvas.height
        );

        // blur background
        ctx.globalCompositeOperation = "source-out";
        ctx.filter = "none";
        ctx.drawImage(bgImage, 0, 0, canvas.width, canvas.height);

        // vẽ lại người
        ctx.globalCompositeOperation = "destination-over";
        ctx.filter = "none";
        ctx.drawImage(results.image, 0, 0, canvas.width, canvas.height);
      });

      async function start() {
        const stream = await navigator.mediaDevices.getUserMedia({
          video: true,
        });
        video.srcObject = stream;
        video.onloadedmetadata = () => {
          video.play();
          loop();
        };
      }

      async function loop() {
        await segmenter.send({ image: video });
        requestAnimationFrame(loop);
      }

      start();

      document.getElementById("pause").addEventListener("click", () => {
        const control = document.getElementById("inputVideo");
        if (control) {
          control.pause();
        }
      });
      document.getElementById("resume").addEventListener("click", () => {
        const control = document.getElementById("inputVideo");
        if (control) {
          control.play();
        }
      });
    </script>
  </body>
</html>
